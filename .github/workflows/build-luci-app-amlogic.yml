#==========================================================================
# https://github.com/ophub/luci-app-amlogic
# Description: Build and Release luci-app-amlogic plugin for OpenWrt
#==========================================================================

name: Build and Release luci-app-amlogic

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Source branch to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - main
          - lua

env:
  LUCI_VERSION: ""
  LUCI_VARIANT: ""
  LUCI_ICO: ""

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix based on branch input
        id: set-matrix
        run: |
          if [[ "${{ inputs.branch }}" == "all" ]]; then
            MATRIX='{"include":[{"branch":"main","format":"apk","sdk_url":"https://downloads.openwrt.org/releases/25.12.4/targets/armsr/armv8/openwrt-sdk-25.12.4-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"},{"branch":"main","format":"ipk","sdk_url":"https://downloads.openwrt.org/releases/24.10.7/targets/armsr/armv8/openwrt-sdk-24.10.7-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"},{"branch":"lua","format":"apk","sdk_url":"https://downloads.openwrt.org/releases/25.12.4/targets/armsr/armv8/openwrt-sdk-25.12.4-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"},{"branch":"lua","format":"ipk","sdk_url":"https://downloads.openwrt.org/releases/24.10.7/targets/armsr/armv8/openwrt-sdk-24.10.7-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"}]}'
          elif [[ "${{ inputs.branch }}" == "lua" ]]; then
            MATRIX='{"include":[{"branch":"lua","format":"apk","sdk_url":"https://downloads.openwrt.org/releases/25.12.4/targets/armsr/armv8/openwrt-sdk-25.12.4-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"},{"branch":"lua","format":"ipk","sdk_url":"https://downloads.openwrt.org/releases/24.10.7/targets/armsr/armv8/openwrt-sdk-24.10.7-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"}]}'
          else
            MATRIX='{"include":[{"branch":"main","format":"apk","sdk_url":"https://downloads.openwrt.org/releases/25.12.4/targets/armsr/armv8/openwrt-sdk-25.12.4-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"},{"branch":"main","format":"ipk","sdk_url":"https://downloads.openwrt.org/releases/24.10.7/targets/armsr/armv8/openwrt-sdk-24.10.7-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"}]}'
          fi
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    needs: setup
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: build-${{ matrix.branch }}-${{ matrix.format }}

    steps:
      - name: Checkout repository [ ${{ matrix.branch }} ]
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Initialize the build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)

      - name: Resolve release tag from Makefile
        env:
          PKG_BRANCH: ${{ matrix.branch }}
        run: |
          # Parse PKG_VERSION and PKG_RELEASE from the Makefile
          PKG_VERSION=$(awk -F':=' '/^PKG_VERSION/{print $2}' luci-app-amlogic/Makefile | tr -d ' ')
          PKG_RELEASE=$(awk -F':=' '/^PKG_RELEASE/{print $2}' luci-app-amlogic/Makefile | tr -d ' ')
          echo "Parsed PKG_VERSION=${PKG_VERSION}"
          echo "Parsed PKG_RELEASE=${PKG_RELEASE}"

          # Determine the release tag, variant, and icon based on the branch
          if [[ "${PKG_BRANCH}" = "lua" ]]; then
            TAG="${PKG_VERSION}"
            VARIANT="Lua Version"
            ICO="![Lua](https://img.shields.io/badge/Lua-2C2D72?logo=lua&logoColor=white)"
          else
            TAG="${PKG_VERSION}-js"
            VARIANT="JavaScript Version"
            ICO="![JavaScript](https://img.shields.io/badge/JavaScript-F7DF1E?logo=javascript&logoColor=black)"
          fi

          echo "Release tag: ${TAG}"
          {
            echo "LUCI_VERSION=${TAG}"
            echo "LUCI_VARIANT=${VARIANT}"
            echo "LUCI_ICO=${ICO}"
          } >> "${GITHUB_ENV}"

      - name: Download and extract the OpenWrt SDK [ ${{ matrix.format }} ]
        env:
          SDK_URL: ${{ matrix.sdk_url }}
        run: |
          SDK_TAR="$(basename "${SDK_URL}")"
          SDK_DIR="${SDK_TAR%.tar.zst}"
          curl -fL --retry 3 --connect-timeout 60 -o "${SDK_TAR}" "${SDK_URL}"
          tar -I zstd -xf "${SDK_TAR}"
          mv "${SDK_DIR}" openwrt-sdk

      - name: Update and install SDK feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add the luci-app-amlogic package
        working-directory: openwrt-sdk
        run: |
          test -d "${GITHUB_WORKSPACE}/luci-app-amlogic" || { echo "source dir missing"; exit 1; }
          rm -rf package/luci-app-amlogic
          cp -af "${GITHUB_WORKSPACE}/luci-app-amlogic" package/luci-app-amlogic
          ls -d package/luci-app-amlogic

      - name: Configure the OpenWrt build
        working-directory: openwrt-sdk
        run: |
          {
            echo "CONFIG_PACKAGE_luci-app-amlogic=y"
            echo "CONFIG_PACKAGE_luci-i18n-amlogic-ru=y"
            echo "CONFIG_PACKAGE_luci-i18n-amlogic-zh-cn=y"
            echo "CONFIG_LUCI_LANG_ru=y"
            echo "CONFIG_LUCI_LANG_zh-cn=y"
          } >> .config
          make defconfig
          grep -E 'luci-app-amlogic|luci-i18n-amlogic-(ru|zh-cn)' .config || true

      - name: Compile the luci-app-amlogic package
        working-directory: openwrt-sdk
        run: |
          if ! make package/luci-app-amlogic/{clean,compile} V=99 -j$(nproc); then
            echo "=== build failed, dumping context ==="
            [[ -f tmp/.packagedeps-luci-app-amlogic ]] && cat tmp/.packagedeps-luci-app-amlogic
            if [[ -d logs ]]; then
              find logs -type f \( -name "*.txt" -o -name "*.log" \) -print -exec sh -c 'echo "--- ${1} ---"; cat "${1}"' _ {} \;
            fi
            exit 1
          fi

      - name: Verify compiled packages
        working-directory: openwrt-sdk
        run: |
          find bin/packages/ -type f \( -name "*.ipk" -o -name "*.apk" \)

      - name: Collect compiled packages
        run: |
          mkdir -p artifacts
          for pattern in "luci-app-amlogic*.ipk" "luci-app-amlogic*.apk" \
                         "luci-i18n-amlogic*.ipk" "luci-i18n-amlogic*.apk"; do
            find openwrt-sdk/bin/packages/ -type f -name "${pattern}" -exec cp {} artifacts/ \;
          done

          echo "=== Collected package files ==="
          ls -lh artifacts/

          if [[ -z "$(ls -A artifacts/ 2>/dev/null)" ]]; then
            echo "ERROR: no luci-app-amlogic / luci-i18n-amlogic ipk or apk packages found"
            exit 1
          fi

      - name: Create Release and upload packages
        uses: ophub/upload-to-releases@main
        with:
          tag: ${{ env.LUCI_VERSION }}
          artifacts: artifacts/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: ${{ matrix.branch == 'main' && matrix.format == 'apk' }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            # ${{ env.LUCI_VARIANT }} ${{ env.LUCI_ICO }}

            ## English
            Supports management of Amlogic s9xxx, Allwinner, and Rockchip boxes.
            The current functions include install OpenWrt to EMMC,
            Manually Upload Updates / Download Updates Online to update the OpenWrt firmware or kernel,
            Backup / Restore firmware config, Snapshot management, etc.

            ## 中文
            支持对晶晨 S9xxx 系列、全志以及瑞芯微的盒子进行在线管理，
            目前的功能包括安装 OpenWrt 至 EMMC、
            手动上传升级/在线下载更新 OpenWrt 固件或内核版本、
            备份/恢复固件配置、快照管理以及自定义固件/内核下载站点等。

            ## Русский
            Поддерживает онлайн-управление приставками серии Amlogic s9xxx, Allwinner и Rockchip.
            Текущие функции включают установку OpenWrt на EMMC,
            ручную загрузку обновлений / загрузку обновлений онлайн для прошивки OpenWrt или ядра,
            резервное копирование / восстановление конфигурации прошивки, управление снапшотами
            и настройку пользовательских источников загрузки прошивки/ядра и т.д.
